name: Advisories

on:
  workflow_dispatch:
  schedule:
    - cron: "23 6 * * 1"

permissions:
  contents: read

jobs:
  audit:
    name: Dependency advisories + SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.8.3

      # Prints the deno.lock SBOM and fails on any OSV npm advisory.
      - name: Check advisories
        run: deno task audit
