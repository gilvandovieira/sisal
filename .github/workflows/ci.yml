name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.3

      - name: Install dependencies
        run: deno install --frozen

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Check docs coverage
        run: deno task --frozen docs:check

      - name: Type check workspace
        run: deno task --frozen check

  discover-packages:
    name: Discover packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.3

      - name: Build package matrix
        id: packages
        run: |
          echo "packages=$(deno run --allow-read tools/workspace_packages.ts matrix)" >> "$GITHUB_OUTPUT"

  packages:
    name: ${{ matrix.package }}
    needs: discover-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-packages.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.3

      - name: Install dependencies
        run: deno install --frozen

      - name: Type check package
        run: |
          deno check --frozen $(deno run --allow-read tools/workspace_packages.ts entrypoints "${{ matrix.path }}")

      - name: Test package
        run: deno test --frozen --allow-read ${{ matrix.path }}

      - name: Validate package publish
        run: deno publish --dry-run --allow-dirty --config ${{ matrix.path }}/deno.json
