name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2
        with:
          deno-version: v2.9.0

      - name: Install dependencies
        run: deno install --frozen

      - name: Check formatting
        run: deno task --frozen fmt:check

      - name: Lint
        run: deno lint

      - name: Check docs coverage
        run: deno task --frozen docs:check

      - name: Check LLM docs
        run: deno task --frozen docs:llms:check

      - name: Check feature-matrix coverage
        run: deno task --frozen docs:matrix:check

      - name: Check container image pinning
        run: deno task --frozen check:images

      - name: Type check workspace
        run: deno task --frozen check

      - name: Test workspace
        run: deno task --frozen test

      - name: Audit dependencies
        run: deno task --frozen audit

      - name: Validate workspace publish
        run: deno publish --dry-run

  discover-packages:
    name: Discover packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2
        with:
          deno-version: v2.9.0

      - name: Build package matrix
        id: packages
        run: |
          echo "packages=$(deno run --allow-read tools/workspace_packages.ts matrix)" >> "$GITHUB_OUTPUT"

  packages:
    name: ${{ matrix.package }}
    needs: discover-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-packages.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2
        with:
          deno-version: v2.9.0

      - name: Install dependencies
        run: deno install --frozen

      - name: Type check package
        run: |
          deno check --frozen $(deno run --allow-read tools/workspace_packages.ts entrypoints "${{ matrix.path }}")

      - name: Test package
        run: deno test --frozen --allow-read ${{ matrix.path }}

      - name: Validate package publish
        run: deno publish --dry-run --allow-dirty --config ${{ matrix.path }}/deno.json
