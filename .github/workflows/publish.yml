name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate packages without publishing
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the tag-ancestry guard can prove the tagged commit
          # is reachable from main (SEC-015).
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2
        with:
          deno-version: v2.9.1

      # Node + npm for the paired npm publish. `registry-url` wires npm to the
      # public registry; auth is OIDC Trusted Publishing (no NPM_TOKEN), which
      # needs the `id-token: write` permission above and `@sisaljs` registered as
      # a trusted publisher for this repo+workflow on npmjs.com (NPM-21).
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: deno install --frozen

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Check docs coverage
        run: deno task --frozen docs:check

      - name: Check LLM docs
        run: deno task --frozen docs:llms:check

      - name: Check feature-matrix coverage
        run: deno task --frozen docs:matrix:check

      - name: Type check workspace
        run: deno task --frozen check

      - name: Test workspace
        run: deno task --frozen test

      - name: Check release tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="${GITHUB_REF_NAME#v}"
          deno run --allow-read tools/check_release_version.ts "$version"

      - name: Dry run workspace publish
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: deno publish --dry-run

      - name: Dry run npm publish
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        env:
          # Empty once trusted publishing is configured (auth is OIDC); set the
          # `NPM_TOKEN` secret only to bootstrap the first publish of a package
          # that does not exist yet, then remove it.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          deno task build:npm:all
          deno run -A tools/npm_publish.ts --dry-run

      - name: Refuse manual publish outside main
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' &&
            !inputs.dry_run &&
            github.ref != 'refs/heads/main'
          }}
        run: |
          echo "::error::Manual publishing must run from the main branch."
          exit 1

      - name: Refuse tag publish not on main
        if: ${{ github.event_name == 'push' }}
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points at a commit that is" \
              "not on main; refusing to publish."
            exit 1
          fi

      - name: Publish workspace (JSR)
        if: >-
          ${{
            github.event_name == 'push' ||
            (
              github.event_name == 'workflow_dispatch' &&
              !inputs.dry_run &&
              github.ref == 'refs/heads/main'
            )
          }}
        run: deno publish

      # Paired npm publish at the identical version, in dependency order, with
      # provenance. Idempotent: versions already on the registry are skipped, so
      # a re-run (or a JSR-only-succeeded run) is safe (NPM-22).
      - name: Publish workspace (npm)
        if: >-
          ${{
            github.event_name == 'push' ||
            (
              github.event_name == 'workflow_dispatch' &&
              !inputs.dry_run &&
              github.ref == 'refs/heads/main'
            )
          }}
        env:
          # Empty once trusted publishing is configured (auth is OIDC); set the
          # `NPM_TOKEN` secret only to bootstrap the first publish of a package
          # that does not exist yet, then remove it.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          deno task build:npm:all
          deno run -A tools/npm_publish.ts
