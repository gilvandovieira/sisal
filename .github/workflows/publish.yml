name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate packages without publishing
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.3

      - name: Install dependencies
        run: deno install --frozen

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Check docs coverage
        run: deno task --frozen docs:check

      - name: Type check workspace
        run: deno task --frozen check

      - name: Test workspace
        run: deno task --frozen test

      - name: Check release tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="${GITHUB_REF_NAME#v}"
          deno run --allow-read tools/check_release_version.ts "$version"

      - name: Dry run workspace publish
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: deno publish --dry-run

      - name: Refuse manual publish outside main
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' &&
            !inputs.dry_run &&
            github.ref != 'refs/heads/main'
          }}
        run: |
          echo "::error::Manual publishing must run from the main branch."
          exit 1

      - name: Publish workspace
        if: >-
          ${{
            github.event_name == 'push' ||
            (
              github.event_name == 'workflow_dispatch' &&
              !inputs.dry_run &&
              github.ref == 'refs/heads/main'
            )
          }}
        run: deno publish
