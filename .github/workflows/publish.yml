name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate packages without publishing
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the tag-ancestry guard can prove the tagged commit
          # is reachable from main (SEC-015).
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.9.0

      - name: Install dependencies
        run: deno install --frozen

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Check docs coverage
        run: deno task --frozen docs:check

      - name: Check LLM docs
        run: deno task --frozen docs:llms:check

      - name: Check feature-matrix coverage
        run: deno task --frozen docs:matrix:check

      - name: Type check workspace
        run: deno task --frozen check

      - name: Test workspace
        run: deno task --frozen test

      - name: Check release tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="${GITHUB_REF_NAME#v}"
          deno run --allow-read tools/check_release_version.ts "$version"

      - name: Dry run workspace publish
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: deno publish --dry-run

      - name: Refuse manual publish outside main
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' &&
            !inputs.dry_run &&
            github.ref != 'refs/heads/main'
          }}
        run: |
          echo "::error::Manual publishing must run from the main branch."
          exit 1

      - name: Refuse tag publish not on main
        if: ${{ github.event_name == 'push' }}
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points at a commit that is" \
              "not on main; refusing to publish."
            exit 1
          fi

      - name: Publish workspace
        if: >-
          ${{
            github.event_name == 'push' ||
            (
              github.event_name == 'workflow_dispatch' &&
              !inputs.dry_run &&
              github.ref == 'refs/heads/main'
            )
          }}
        run: deno publish
