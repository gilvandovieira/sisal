# PostgreSQL compatibility matrix for Sisal.
#
# Brings up PostgreSQL 16, 17, and 18 and (optionally) a Deno runner that
# executes the feature suite against one of them.
#
#   # bring up the three servers
#   docker compose -f docker/compose.yaml up -d pg16 pg17 pg18
#
#   # run the suite against one server (host Deno):
#   DATABASE_URL=postgres://postgres:postgres@localhost:55418/sisal \
#     deno test --allow-net --allow-env --allow-read integration/pg_features_test.ts
#
#   # or fully in Docker, against a chosen server:
#   DATABASE_URL=postgres://postgres:postgres@pg18:5432/sisal \
#     docker compose -f docker/compose.yaml run --rm runner
#
# `scripts/pg-matrix.sh` drives all three versions and prints a summary.
name: sisal-pg-matrix

x-pg: &pg
  environment:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_DB: sisal
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres -d sisal"]
    interval: 2s
    timeout: 3s
    retries: 40

services:
  pg16:
    <<: *pg
    image: postgres:16@sha256:fe03a7605299a34ddf5e4f285dff78c3d7190a576b3c6b46f2fcff69f4bffd54
    ports: ["55416:5432"]

  pg17:
    <<: *pg
    image: postgres:17@sha256:5c855ad7b85e68e48a62f34662853f38b57c1c1d80f3a927ab58034fd6d31c5e
    ports: ["55417:5432"]

  pg18:
    <<: *pg
    image: postgres:18@sha256:4aabea78cf39b90e834caf3af7d602a18565f6fe2508705c8d01aa63245c2e20
    ports: ["55418:5432"]

  # Neon's serverless driver speaks Postgres over a WebSocket. `neon-proxy`
  # bridges that WebSocket to a plain Postgres, so the Neon adapter can be
  # exercised locally exactly as it would against neon.tech.
  neon-pg:
    <<: *pg
    image: postgres:17@sha256:5c855ad7b85e68e48a62f34662853f38b57c1c1d80f3a927ab58034fd6d31c5e

  neon-proxy:
    image: ghcr.io/neondatabase/wsproxy:latest@sha256:7f2e2149aa6a57ba382a140102fba44f5053f3e44389ccc18adcecf896054efb
    environment:
      APPEND_PORT: "neon-pg:5432"
      ALLOW_ADDR_REGEX: ".*"
      LOG_TRAFFIC: "false"
    ports: ["5499:80"]
    depends_on:
      neon-pg:
        condition: service_healthy

  runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    profiles: ["runner"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@pg18:5432/sisal}
